<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HoloGrasp | V7 (Mobile Optimized)</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #050505; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            cursor: crosshair; 
            touch-action: none; 
            user-select: none; 
        }
        canvas { display: block; }

        /* --- UI CONTAINER --- */
        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #00ffcc;
            background: rgba(0, 0, 0, 0.75);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 204, 0.2);
            backdrop-filter: blur(10px);
            width: 240px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            pointer-events: auto;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            overflow: hidden;
        }

        /* Collapsed State for Mobile Space-Saving */
        #ui.collapsed {
            width: 40px;
            height: 40px;
            padding: 5px;
            background: rgba(0, 255, 204, 0.2);
            border-color: #00ffcc;
        }

        #ui.collapsed * {
            display: none;
        }

        #ui.collapsed #toggle-ui {
            display: flex;
            position: relative;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background: transparent;
        }

        h1 { margin: 0 0 10px 0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; }
        
        .control-row { 
            display: flex; 
            align-items: center; 
            margin-bottom: 6px; 
            font-size: 0.85rem; 
            color: #ddd; 
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            transition: background 0.2s;
        }
        .control-row:active { background: rgba(0, 255, 204, 0.4); }

        .icon { width: 20px; text-align: center; margin-right: 10px; font-size: 1rem; }
        .status-label { color: #666; font-size: 0.7rem; margin-top: 12px; text-transform: uppercase; }
        .highlight { color: #fff; font-weight: bold; font-size: 0.85rem; }
        
        #toggle-ui {
            position: absolute;
            top: 12px;
            right: 12px;
            cursor: pointer;
            font-size: 1.2rem;
            z-index: 101;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- MOBILE TWEAKS --- */
        @media (max-width: 600px) {
            #ui {
                width: 170px;
                padding: 10px;
                top: 10px;
                left: 10px;
            }
            .control-row { font-size: 0.75rem; padding: 6px; }
            .credits { display: none; }
        }

        .credits {
            margin-top: 15px;
            padding-top: 8px;
            border-top: 1px solid #222;
            font-size: 0.65rem;
            color: #555;
            text-align: center;
        }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<div id="ui">
    <div id="toggle-ui" title="Toggle Menu">⚙️</div>
    <h1>Controls</h1>
    
    <div class="control-row" id="btn-shape">
        <div class="icon">🔄</div>
        <div><b>Shape</b></div>
    </div>
    
    <div class="control-row" id="btn-color">
        <div class="icon">🎨</div>
        <div><b>Theme</b></div>
    </div>

    <div class="status-label">Live Stats</div>
    <div style="font-size: 0.8rem;">
        Obj: <span id="shape-name" class="highlight">Sphere</span><br>
        Mode: <span id="gesture-indicator" class="highlight" style="color:#ffeb3b">Idle</span>
    </div>

    <div class="credits">
        <b>Habibul Goni</b> | Aupu
    </div>
</div>

<script>
    // --- SETUP & STATE ---
    const PARTICLE_COUNT = 15000; // Optimized for mobile performance
    let currentShapeIndex = 0;
    const shapeNames = ["Sphere", "Saturn", "DNA Helix", "Cube", "Torus", "Truth"];
    let currentColorIndex = 0;
    const colorThemes = ["Neon", "Fire", "Ice", "Matrix"];
    let handState = { active: false, x: 0, y: 0, isFist: false };

    // --- THREE.JS ENGINE ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 80;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // Particles Setup
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const targetPositions = new Float32Array(PARTICLE_COUNT * 3);
    const colors = new Float32Array(PARTICLE_COUNT * 3);
    const baseColors = new Float32Array(PARTICLE_COUNT * 3);

    for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
        positions[i] = (Math.random() - 0.5) * 100;
        targetPositions[i] = positions[i];
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({
        size: 0.25,
        vertexColors: true,
        blending: THREE.AdditiveBlending,
        transparent: true,
        opacity: 0.8
    });

    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    // --- LOGIC FUNCTIONS ---
    function applyColorTheme(type) {
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            let r, g, b; const t = Math.random();
            if (type === "Neon") { r = t; g = 1-t; b = 1; }
            else if (type === "Fire") { r = 1; g = t*0.5; b = 0; }
            else if (type === "Ice") { r = 0; g = 0.5+t*0.5; b = 1; }
            else { r = 0; g = 1; b = 0.2; } // Matrix
            baseColors[i*3] = r; baseColors[i*3+1] = g; baseColors[i*3+2] = b;
        }
        geometry.attributes.color.needsUpdate = true;
    }

    function calculateShape(type) {
        document.getElementById('shape-name').innerText = type;
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            let x, y, z;
            if (type === "Sphere") {
                const r = 25; const theta = Math.random()*Math.PI*2; const phi = Math.acos((Math.random()*2)-1);
                x = r*Math.sin(phi)*Math.cos(theta); y = r*Math.sin(phi)*Math.sin(theta); z = r*Math.cos(phi);
            } else if (type === "Cube") {
                const s = 25; x = (Math.random()-0.5)*s*2; y = (Math.random()-0.5)*s*2; z = (Math.random()-0.5)*s*2;
            } else if (type === "DNA Helix") {
                const t = Math.random()*10*Math.PI; const r = 12; const strand = Math.random()>0.5?1:-1;
                x = r*Math.cos(t+(strand*Math.PI)); z = r*Math.sin(t+(strand*Math.PI)); y = (t-5*Math.PI)*2;
            } else if (type === "Torus") {
                const u = Math.random()*Math.PI*2; const v = Math.random()*Math.PI*2;
                const R = 25; const tube = 8;
                x = (R+tube*Math.cos(v))*Math.cos(u); y = (R+tube*Math.cos(v))*Math.sin(u); z = tube*Math.sin(v);
            } else if (type === "Saturn") {
                if(Math.random() > 0.5) {
                    const a = Math.random()*Math.PI*2; const r = 35+Math.random()*15;
                    x = Math.cos(a)*r; z = Math.sin(a)*r; y = (Math.random()-0.5)*2;
                } else {
                    const r = 18; const theta = Math.random()*Math.PI*2; const phi = Math.acos((Math.random()*2)-1);
                    x = r*Math.sin(phi)*Math.cos(theta); y = r*Math.sin(phi)*Math.sin(theta); z = r*Math.cos(phi);
                }
            } else { // Truth
                x = (Math.random()-0.5)*100; y = (Math.random()-0.5)*40; z = (Math.random()-0.5)*5;
            }
            targetPositions[i*3] = x; targetPositions[i*3+1] = y; targetPositions[i*3+2] = z;
        }
    }

    // --- INTERACTION HANDLERS ---
    const uiBox = document.getElementById('ui');
    const indicator = document.getElementById('gesture-indicator');

    document.getElementById('toggle-ui').addEventListener('click', (e) => {
        e.stopPropagation();
        uiBox.classList.toggle('collapsed');
    });

    document.getElementById('btn-shape').addEventListener('click', () => {
        currentShapeIndex = (currentShapeIndex + 1) % shapeNames.length;
        calculateShape(shapeNames[currentShapeIndex]);
    });

    document.getElementById('btn-color').addEventListener('click', () => {
        currentColorIndex = (currentColorIndex + 1) % colorThemes.length;
        applyColorTheme(colorThemes[currentColorIndex]);
    });

    function updateCoords(x, y) {
        const vFOV = THREE.MathUtils.degToRad(camera.fov);
        const h = 2 * Math.tan(vFOV / 2) * camera.position.z;
        const w = h * camera.aspect;
        handState.x = ((x / window.innerWidth) - 0.5) * w;
        handState.y = (0.5 - (y / window.innerHeight)) * h;
        handState.active = true;
    }

    // Input Listeners
    window.addEventListener('mousemove', e => { updateCoords(e.clientX, e.clientY); indicator.innerText = "Hover"; });
    window.addEventListener('mousedown', e => { if(!e.target.closest('#ui')) { handState.isFist = true; indicator.innerText = "Black Hole"; }});
    window.addEventListener('mouseup', () => { handState.isFist = false; indicator.innerText = "Idle"; });
    
    window.addEventListener('touchstart', e => {
        if(e.target.closest('#ui')) return;
        updateCoords(e.touches[0].clientX, e.touches[0].clientY);
        handState.isFist = true;
        indicator.innerText = "Black Hole";
    }, {passive: false});

    window.addEventListener('touchmove', e => {
        if(e.target.closest('#ui')) return;
        e.preventDefault();
        updateCoords(e.touches[0].clientX, e.touches[0].clientY);
    }, {passive: false});

    window.addEventListener('touchend', () => { handState.isFist = false; handState.active = false; indicator.innerText = "Idle"; });

    // --- ANIMATION ---
    const clock = new THREE.Clock();
    function animate() {
        requestAnimationFrame(animate);
        const dt = clock.getDelta();
        const p = geometry.attributes.position.array;
        const c = geometry.attributes.color.array;

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const ix = i * 3;
            const tx = targetPositions[ix], ty = targetPositions[ix+1], tz = targetPositions[ix+2];

            if (handState.isFist && handState.active) {
                const dx = p[ix] - handState.x, dy = p[ix+1] - handState.y;
                let ang = Math.atan2(dy, dx) + 5.0 * dt;
                const r = 15 + ((i % 50));
                p[ix] += (handState.x + Math.cos(ang)*r - p[ix]) * 6 * dt;
                p[ix+1] += (handState.y + Math.sin(ang)*r - p[ix+1]) * 6 * dt;
                p[ix+2] += (0 - p[ix+2]) * 6 * dt;
                c[ix] = 1; c[ix+1] = 0.8; c[ix+2] = 1;
            } else {
                p[ix] += (tx - p[ix]) * 3 * dt;
                p[ix+1] += (ty - p[ix+1]) * 3 * dt;
                p[ix+2] += (tz - p[ix+2]) * 3 * dt;
                c[ix] += (baseColors[ix] - c[ix]) * 0.1;
                c[ix+1] += (baseColors[ix+1] - c[ix+1]) * 0.1;
                c[ix+2] += (baseColors[ix+2] - c[ix+2]) * 0.1;

                if (handState.active) {
                    const dx = p[ix]-handState.x, dy = p[ix+1]-handState.y;
                    const d = Math.sqrt(dx*dx + dy*dy);
                    if (d < 30) {
                        const f = (30-d)/30; const a = Math.atan2(dy, dx);
                        p[ix] += Math.cos(a+1)*f*50*dt; p[ix+1] += Math.sin(a+1)*f*50*dt;
                        c[ix]=1; c[ix+1]=1; c[ix+2]=1;
                    }
                }
            }
        }
        particles.rotation.y += 0.1 * dt;
        geometry.attributes.position.needsUpdate = true;
        geometry.attributes.color.needsUpdate = true;
        renderer.render(scene, camera);
    }

    calculateShape("Sphere");
    applyColorTheme("Neon");
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
